name: Node.js

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'binding/nodejs/**'
      - '!binding/nodejs/README.md'
      - 'lib/node/**'
      - '.github/workflows/nodejs.yml'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
    paths:
      - 'binding/nodejs/**'
      - '!binding/nodejs/README.md'
      - 'lib/node/**'
      - '.github/workflows/nodejs.yml'

defaults:
  run:
    working-directory: binding/nodejs

jobs:
  build-github-hosted:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: yarn install

    - name: Setup build
      run: yarn prepare

    - name: Build
      run: yarn build

    - name: Test
      run: yarn test

  build-self-hosted:
    runs-on: ${{ matrix.machine }}

    strategy:
      matrix:
        machine: [rpi3-32, rpi3-64, rpi4-32, rpi4-64, rpi5-32, rpi5-64, pv-windows, pv-windows-arm64, pv-ios]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Pre-build dependencies
      run: npm install yarn

    - name: Install dependencies
      run: yarn install

    - name: Setup build
      run: yarn prepare

    - name: Build
      run: yarn build

    - name: Test
      run: yarn test

  node-sea-win-arm64:
    runs-on: ${{ matrix.machine }}
    defaults:
      run:
        working-directory: .github/actions/node-sea

    strategy:
      matrix:
        machine: [pv-windows-arm64]

    steps:
    - uses: actions/checkout@v3      

    - name: Generate SEA blob
      run: node --experimental-sea-config sea-config.json

    - name: Generate SEA exe
      run: node -e "require('fs').copyFileSync(process.execPath, 'sea.exe')"

    - name: Inject SEA
      run: npx --yes postject sea.exe NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

    - name: Run SEA
      run: sea.exe
